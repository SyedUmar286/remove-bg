<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Object Remover Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-js" type="text/javascript"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: system-ui, sans-serif; }
        canvas { touch-action: none; }
        .loader {
            border: 4px solid #1e293b; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 sm:p-6">

    <header class="text-center my-4">
        <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-600">
            MAGIC ERASER PRO
        </h1>
        <p class="text-gray-400 text-sm sm:text-base mt-2">Professional object removal tool — 100% Free & Secure</p>
    </header>

    <main class="w-full max-w-5xl bg-slate-900/80 backdrop-blur-md p-4 sm:p-6 rounded-2xl shadow-2xl border border-slate-800 flex flex-col items-center gap-6">
        
        <div class="w-full flex flex-wrap items-center justify-between gap-4 pb-4 border-b border-slate-800">
            <label class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl cursor-pointer transition shadow-lg shadow-blue-600/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                Upload Image
                <input type="file" id="upload" accept="image/*" class="hidden"/>
            </label>
            
            <div class="flex items-center gap-3 bg-slate-950 px-4 py-2 rounded-xl border border-slate-800">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Brush:</span>
                <input type="range" id="brushSize" min="5" max="60" value="25" class="w-24 sm:w-32 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                <span id="brushVal" class="text-xs font-mono bg-slate-800 text-cyan-400 px-2 py-0.5 rounded border border-slate-700">25px</span>
            </div>

            <div class="flex items-center gap-2">
                <button id="clearBtn" class="bg-slate-800 hover:bg-slate-700 text-gray-300 font-medium text-sm py-2.5 px-4 rounded-xl transition border border-slate-700">
                    Reset Selection
                </button>
                <button id="removeBtn" class="relative overflow-hidden bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold text-sm py-2.5 px-6 rounded-xl shadow-xl shadow-emerald-900/30 transition flex items-center gap-2">
                    <span id="loaderIcon" class="loader hidden"></span>
                    <span id="btnText">Erase Selected</span>
                </button>
            </div>
        </div>

        <div class="relative w-full overflow-auto flex justify-center bg-slate-950/50 rounded-xl p-2 sm:p-4 min-h-[350px] items-center border border-slate-800/60 shadow-inner">
            <div id="canvasContainer" class="relative hidden">
                <canvas id="editorCanvas" class="max-w-full h-auto rounded-lg shadow-2xl border border-slate-800"></canvas>
            </div>
            
            <div id="placeholderText" class="text-gray-500 text-center flex flex-col items-center gap-3 p-8">
                <div class="p-4 bg-slate-900 rounded-full text-slate-700 border border-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </div>
                <div>
                    <p class="text-lg font-semibold text-slate-300">No active image</p>
                    <p class="text-sm text-slate-500 max-w-xs mt-1">Upload any picture, paint over the area or object you want to disappear, and hit erase.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="my-4 text-xs text-slate-600 text-center">
        Powered by OpenCV.js Client Engine • 100% Serverless & Lifetime Free Hosting
    </footer>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const placeholder = document.getElementById('placeholderText');
        const brushSizeInput = document.getElementById('brushSize');
        const brushVal = document.getElementById('brushVal');
        const clearBtn = document.getElementById('clearBtn');
        const removeBtn = document.getElementById('removeBtn');
        const btnText = document.getElementById('btnText');
        const loaderIcon = document.getElementById('loaderIcon');

        let img = new Image();
        let isDrawing = false;
        let brushSize = 25;
        
        // Background matrix representation for mask tracking
        let maskCanvas = document.createElement('canvas');
        let maskCtx = maskCanvas.getContext('2d');

        // Check if OpenCV is ready
        let openCvReady = false;
        document.getElementById('opencv-js').addEventListener('load', () => {
            openCvReady = true;
            console.log("OpenCV Client Library Ready.");
        });

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { img.src = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        img.onload = () => {
            // Setup canvas resolution mapping 1:1 with real image size
            canvas.width = img.width;
            canvas.height = img.height;
            maskCanvas.width = img.width;
            maskCanvas.height = img.height;
            
            resetWorkspace();

            container.classList.remove('hidden');
            placeholder.classList.add('hidden');
        };

        function resetWorkspace() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            
            // Mask setup: Fill black everywhere (safe zone)
            maskCtx.fillStyle = "black";
            maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
        }

        brushSizeInput.addEventListener('input', (e) => {
            brushSize = e.target.value;
            brushVal.textContent = brushSize + 'px';
        });

        // Event Listeners for both Desktop and Mobile view touch/drag
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing || !img.src) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Draw translucent red brush on screen
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
            ctx.lineTo(x, y);
            ctx.stroke();

            // Draw pure white lines on the invisible AI mask channel
            maskCtx.lineWidth = brushSize;
            maskCtx.lineCap = 'round';
            maskCtx.lineJoin = 'round';
            maskCtx.strokeStyle = 'white';
            maskCtx.lineTo(x, y);
            maskCtx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            maskCtx.beginPath();
            maskCtx.moveTo(x, y);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
            maskCtx.beginPath();
        }

        clearBtn.addEventListener('click', () => {
            if(img.src) resetWorkspace();
        });

        // 🔥 HIGH PERFORMANCE LOCAL OPENCV INPAINT LOGIC 🔥
        removeBtn.addEventListener('click', () => {
            if (!img.src) return alert("Pehle ek picture upload kijiye!");
            if (!openCvReady) return alert("AI core load ho raha hai, thoda intezar karein!");

            btnText.textContent = "Processing...";
            loaderIcon.classList.remove('hidden');
            removeBtn.disabled = true;

            // Give browser time to process UI loader change
            setTimeout(() => {
                try {
                    // Read data from active UI canvas and mask canvas directly into OpenCV matrix formats
                    let src = cv.imread(canvas);
                    let mask = cv.imread(maskCanvas, cv.IMREAD_GRAYSCALE);
                    let dst = new cv.Mat();

                    // Apply Navier-Stokes based Professional Inpainting Algorithm entirely inside the user's browser
                    cv.inpaint(src, mask, dst, 5, cv.INPAINT_NS);

                    // Show output directly back onto the main canvas screen
                    cv.imshow(canvas, dst);

                    // Clean up Memory allocations
                    src.delete();
                    mask.delete();
                    dst.delete();

                    // Reset mask for sequential editing steps
                    maskCtx.fillStyle = "black";
                    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);

                } catch (err) {
                    console.error("Inpainting failure:", err);
                    alert("Kuch masla hua, dobara koshish karein.");
                } finally {
                    btnText.textContent = "Erase Selected";
                    loaderIcon.classList.add('hidden');
                    removeBtn.disabled = false;
                }
            }, 50);
        });
    </script>
</body>
</html>

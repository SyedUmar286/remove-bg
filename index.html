<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Object Remover</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        canvas { border: 2px dashed #3b82f6; cursor: crosshair; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-5">

    <header class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">
            Object Eraser Pro
        </h1>
        <p class="text-gray-400 mt-2">Upload, brush, and remove unwanted objects instantly.</p>
    </header>

    <main class="w-full max-w-4xl bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800 flex flex-col items-center">
        
        <div class="w-full flex flex-wrap justify-between items-center gap-4 mb-6 pb-6 border-b border-slate-800">
            <input type="file" id="upload" accept="image/*" class="block text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer"/>
            
            <div class="flex items-center gap-3">
                <label for="brushSize" class="text-sm font-medium">Brush Size:</label>
                <input type="range" id="brushSize" min="5" max="50" value="20" class="w-32 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                <span id="brushVal" class="text-sm bg-slate-800 px-2 py-1 rounded">20px</span>
            </div>

            <button id="clearBtn" class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition">Reset</button>
            <button id="removeBtn" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-2 px-6 rounded-lg shadow-lg transition">
                <span id="btnText">Remove Object</span>
            </button>
        </div>

        <div class="relative w-full overflow-auto flex justify-center bg-slate-950 rounded-xl p-4 min-h-[300px] items-center">
            <canvas id="editorCanvas" class="max-w-full h-auto shadow-md rounded-lg hidden"></canvas>
            <div id="placeholderText" class="text-gray-500 text-center">
                <p class="text-lg">No image uploaded yet</p>
                <p class="text-sm text-gray-600">Upload a picture and rub the area you want to erase.</p>
            </div>
        </div>
    </main>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholderText');
        const brushSizeInput = document.getElementById('brushSize');
        const brushVal = document.getElementById('brushVal');
        const clearBtn = document.getElementById('clearBtn');
        const removeBtn = document.getElementById('removeBtn');
        const btnText = document.getElementById('btnText');

        let img = new Image();
        let isDrawing = false;
        let brushSize = 20;
        
        // Ek alag canvas background mein mask record karne ke liye
        let maskCanvas = document.createElement('canvas');
        let maskCtx = maskCanvas.getContext('2d');

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { img.src = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            maskCanvas.width = img.width;
            maskCanvas.height = img.height;
            
            ctx.drawImage(img, 0, 0);
            
            // Mask ko shuru mein pura black kar do (Black matlab safe area)
            maskCtx.fillStyle = "black";
            maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);

            canvas.classList.remove('hidden');
            placeholder.classList.add('hidden');
        };

        brushSizeInput.addEventListener('input', (e) => {
            brushSize = e.target.value;
            brushVal.textContent = brushSize + 'px';
        });

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); maskCtx.beginPath(); });

        function draw(e) {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Screen par dikhane ke liye (Red brush)
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.lineTo(x, y);
            ctx.stroke();

            // AI ke samajhne ke liye (White brush - AI sirf white area remove karta hai)
            maskCtx.lineWidth = brushSize;
            maskCtx.lineCap = 'round';
            maskCtx.strokeStyle = 'white';
            maskCtx.lineTo(x, y);
            maskCtx.stroke();
        }

        clearBtn.addEventListener('click', () => {
            if(img.src) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                maskCtx.fillStyle = "black";
                maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
            }
        });

        // 🔥 ASLI AI REMOVE LOGIC START HERE 🔥
        removeBtn.addEventListener('click', async () => {
            if (!img.src) return alert("Pehle image upload karein!");
            
            btnText.textContent = "Erasing Object... Please wait...";
            removeBtn.disabled = true;

            try {
                // Canvas ko image blobs mein convert karna
                const imageBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
                const maskBlob = await new Promise(resolve => maskCanvas.toBlob(resolve, 'image/jpeg'));

                const formData = new FormData();
                formData.append("image", imageBlob);
                formData.append("mask", maskBlob);

                // Hugging Face ki Free Inpainting AI API ko call karna
                const response = await fetch("https://api-inference.huggingface.co/models/SberbankAI/Kandinsky-2.2-Inpainting", {
                    method: "POST",
                    headers: { "Authorization": "Bearer hf_MvXvXvXvXvXvXvXvXvXvXvXvXvXvXvXvXv" }, // Demo Token (For production, use your own free token)
                    body: formData
                });

                if (!response.ok) throw new Error("AI Processing failed.");

                const resultBlob = await response.blob();
                const resultUrl = URL.createObjectURL(resultBlob);
                
                // New Image ko main canvas par load karna
                let resultImg = new Image();
                resultImg.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(resultImg, 0, 0);
                    // Mask reset karein taaki naye siray se remove kiya ja sake
                    maskCtx.fillStyle = "black";
                    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
                    btnText.textContent = "Remove Object";
                    removeBtn.disabled = false;
                };
                resultImg.src = resultUrl;

            } catch (error) {
                console.error(error);
                alert("Ek dafa phir koshish karein ya apna free Hugging Face Token lagayein.");
                btnText.textContent = "Remove Object";
                removeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
